name: ccaas-agent-desktop

# NOTE: This workflow lives inside the app folder per the build constraint.
# To activate it in CI, copy it to `.github/workflows/` at the monorepo root
# (or symlink there). The `paths` filter assumes the monorepo layout
# `apps/ccaas-agent-desktop/`.
on:
  push:
    branches: [main]
    paths:
      - "apps/ccaas-agent-desktop/**"
      - "schemas/**"
      - ".github/workflows/ccaas-agent-desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ccaas-agent-desktop/**"
      - "schemas/**"
      - ".github/workflows/ccaas-agent-desktop.yml"

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ccaas-agent-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ccaas-agent-desktop/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --silent || true

      - name: Test (Vitest)
        run: npm test -- --reporter=default

      - name: Build
        run: npm run build

      - name: Bundle size budget
        run: node scripts/gzip-size.cjs
        env:
          GZIP_BUDGET_KB: "1500"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccaas-agent-desktop-dist
          path: apps/ccaas-agent-desktop/dist
          if-no-files-found: error
