<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" fill="none">
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ad6c5"/><stop offset="1" stop-color="#2bb3a3"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8ff"/><stop offset="1" stop-color="#4f86e8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#3ad6c5" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#3ad6c5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="380" cy="350" r="320" fill="url(#glow)"/>

  <!-- dashboard screen behind -->
  <g opacity="0.92">
    <rect x="230" y="120" width="320" height="210" rx="16" fill="#0e2336" stroke="#1d4257" stroke-width="2"/>
    <rect x="252" y="144" width="120" height="12" rx="6" fill="url(#teal)" opacity="0.9"/>
    <rect x="252" y="170" width="220" height="8" rx="4" fill="#27506a"/>
    <rect x="252" y="188" width="180" height="8" rx="4" fill="#27506a"/>
    <rect x="252" y="226" width="28" height="64" rx="5" fill="#27506a"/>
    <rect x="290" y="208" width="28" height="82" rx="5" fill="url(#blue)"/>
    <rect x="328" y="240" width="28" height="50" rx="5" fill="#27506a"/>
    <rect x="366" y="218" width="28" height="72" rx="5" fill="url(#teal)"/>
    <rect x="404" y="250" width="28" height="40" rx="5" fill="#27506a"/>
    <rect x="442" y="230" width="28" height="60" rx="5" fill="url(#blue)"/>
  </g>

  <!-- speech bubbles (customer conversation) -->
  <g>
    <rect x="100" y="200" width="118" height="58" rx="18" fill="url(#teal)"/>
    <path d="M128 258 l0 24 l24 -24 z" fill="url(#teal)"/>
    <circle cx="132" cy="229" r="6.5" fill="#0a1626"/>
    <circle cx="158" cy="229" r="6.5" fill="#0a1626"/>
    <circle cx="184" cy="229" r="6.5" fill="#0a1626"/>

    <rect x="540" y="250" width="118" height="58" rx="18" fill="url(#blue)"/>
    <path d="M630 308 l0 24 l-24 -24 z" fill="url(#blue)"/>
    <circle cx="574" cy="279" r="6.5" fill="#0a1626"/>
    <circle cx="600" cy="279" r="6.5" fill="#0a1626"/>
    <circle cx="626" cy="279" r="6.5" fill="#0a1626"/>
  </g>

  <!-- desk -->
  <rect x="150" y="600" width="460" height="22" rx="11" fill="#16364a"/>

  <!-- AGENT with headset -->
  <g>
    <path d="M280 600 q100 -130 200 0 z" fill="url(#blue)"/>
    <rect x="270" y="556" width="220" height="60" rx="30" fill="url(#blue)"/>
    <rect x="358" y="466" width="44" height="60" rx="20" fill="#e8b48f"/>
    <circle cx="380" cy="424" r="68" fill="#f0c4a0"/>
    <path d="M312 420 a68 68 0 0 1 136 0 q-68 -42 -136 0z" fill="#2a3a4a"/>
    <!-- headset -->
    <path d="M308 424 a72 72 0 0 1 144 0" stroke="#1f2d3a" stroke-width="12" fill="none" stroke-linecap="round"/>
    <rect x="298" y="418" width="22" height="42" rx="11" fill="url(#teal)"/>
    <rect x="440" y="418" width="22" height="42" rx="11" fill="url(#teal)"/>
    <path d="M309 458 q-22 30 8 48" stroke="url(#teal)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <circle cx="323" cy="508" r="9" fill="url(#teal)"/>
    <circle cx="323" cy="508" r="24" stroke="url(#teal)" stroke-width="3" fill="none" opacity="0.5"/>
    <circle cx="323" cy="508" r="38" stroke="url(#teal)" stroke-width="2" fill="none" opacity="0.3"/>
  </g>
</svg>